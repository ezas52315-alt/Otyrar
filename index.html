<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отырар Қазынасы: Тарихи Миссия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Comfortaa:wght@300;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #1a0f00 0%, #000000 100%);
            color: #e2c08d;
            font-family: 'Comfortaa', sans-serif;
            overflow-x: hidden;
        }
        .cinematic-font {
            font-family: 'Cinzel', serif;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 20px rgba(226, 192, 141, 0.5);
        }
        .card-gold {
            background: linear-gradient(135deg, #2c1e0a 0%, #1a0f00 100%);
            border: 1px solid #4a3721;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card-gold:hover:not(.disabled) {
            border-color: #e2c08d;
            box-shadow: 0 0 15px rgba(226, 192, 141, 0.3);
            transform: translateY(-5px);
        }
        .disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }
        .golden-text {
            color: #e2c08d;
        }
        .btn-action {
            background: linear-gradient(to right, #8e6d3d, #c5a059);
            color: #1a0f00;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-action:hover {
            transform: scale(1.05);
        }
        /* Анимация для "сгорания" свитка */
        @keyframes scrollOpen {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }
        .scroll-animation {
            animation: scrollOpen 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Start Screen -->
    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black p-4 text-center">
        <div class="max-w-3xl">
            <h1 class="header-title text-5xl md:text-7xl mb-6 golden-text">ОТЫРАР ҚҰПИЯСЫ</h1>
            <p class="text-xl md:text-2xl mb-12 italic text-gray-400">«Әлемнің екінші ұлы білім бұлағын сақтап қалу сенің қолыңда...»</p>
            <button onclick="startGame()" class="btn-action px-10 py-4 rounded-full text-xl cinematic-font tracking-widest">
                ЭКСПЕДИЦИЯНЫ БАСТАУ
            </button>
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-ui" class="hidden flex-grow flex flex-col container mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-10 border-b border-yellow-900 pb-4">
            <div>
                <h2 class="cinematic-font text-2xl tracking-widest uppercase">Отырар Жылнамасы</h2>
            </div>
            <div class="text-right">
                <p class="text-sm uppercase tracking-widest text-gray-500">Жиналған ақыл-ой:</p>
                <p id="score" class="text-3xl golden-text font-bold">0</p>
            </div>
        </header>

        <div id="board" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Categories will be generated here -->
        </div>

        <footer class="mt-auto pt-8 text-center text-xs text-gray-600 uppercase tracking-widest">
            1218 жыл • Отырар қаласы • Фараб мұрасы
        </footer>
    </div>

    <!-- Question Modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-[#1a0f00] border-2 border-[#8e6d3d] p-8 md:p-12 max-w-2xl w-full rounded-lg shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-[#8e6d3d]"></div>
            
            <div id="modal-content" class="text-center">
                <h3 id="modal-category" class="text-sm uppercase tracking-tighter text-gray-500 mb-2">Санат</h3>
                <p id="modal-question" class="text-2xl md:text-3xl mb-8 leading-relaxed italic"></p>
                
                <div id="options-container" class="grid grid-cols-1 gap-4 mb-8">
                    <!-- Options buttons -->
                </div>

                <div id="feedback" class="hidden mb-6 py-2 px-4 rounded font-bold text-lg"></div>

                <button id="close-btn" onclick="closeModal()" class="hidden btn-action px-8 py-2 rounded-lg">
                    Келесі кезең
                </button>
            </div>
        </div>
    </div>

    <script>
        const gameData = [
            {
                category: "Тарих толқыны",
                questions: [
                    { val: 100, q: "Отырарды қоршауға алған моңғол әскері бұл әрекетті неше ай бойы жалғастырды?", a: "6 ай", options: ["3 ай", "6 ай", "1 жыл", "9 ай"] },
                    { val: 200, q: "Шыңғыс хан шапқыншылығы қай жылы орын алды?", a: "1218", options: ["1218", "1221", "1206", "1240"] },
                    { val: 300, q: "Отырар қаласының ежелгі атауы қалай аталған?", a: "Фараб", options: ["Сайрам", "Сығанақ", "Фараб", "Яссы"] },
                    { val: 400, q: "Керуендер мен көпестер Отырар арқылы қай танымал жол бойымен жүрген?", a: "Ұлы Жібек жолы", options: ["Алтын жол", "Шығыс жолы", "Ұлы Жібек жолы", "Түркістан жолы"] },
                    { val: 500, q: "Отырар кітапханасын пайдаланған өзге қала тұрғындары туралы кім жазған?", a: "Рузбехан", options: ["Әл-Фараби", "Рузбехан", "Марко Поло", "Ибн Баттута"] }
                ]
            },
            {
                category: "Ұлы Тұлғалар",
                questions: [
                    { val: 100, q: "Әлемнің екінші ұстазы атанған, осы кітапханадан білім алған ғұлама кім?", a: "Әбу Насыр әл-Фараби", options: ["Қожа Ахмет Яссауи", "Әбу Насыр әл-Фараби", "Жүсіп Баласағұн", "Махмұд Қашқари"] },
                    { val: 200, q: "Отырар кітапханасы әлем бойынша көлемі жағынан нешінші орында болған?", a: "Екінші", options: ["Бірінші", "Екінші", "Үшінші", "Оныншы"] },
                    { val: 300, q: "Кітапхана қорында ежелгі жазудың қандай түрімен жазылған туындылар болды?", a: "Сына жазуы", options: ["Латын", "Кирилл", "Сына жазуы", "Төте жазу"] },
                    { val: 400, q: "Отырар әкіміне көпестер ең құнды сыйлық ретінде не беретін болған?", a: "Кітап", options: ["Алтын", "Тұлпар", "Кітап", "Жібек мата"] },
                    { val: 500, q: "Отырар кітапханасындағы біліммен сусындаған ғалымдар қай аймақтардан шыққан?", a: "Бүкіл дүниежүзіне мәшһүр", options: ["Тек Орталық Азия", "Тек Қазақстан", "Бүкіл дүниежүзіне мәшһүр", "Тек ислам әлемі"] }
                ]
            },
            {
                category: "Жұмбақ Мұра",
                questions: [
                    { val: 100, q: "Отырар кітапханасы шапқыншылық кезінде қайда жасырылған деген дерек бар?", a: "Жер астына", options: ["Мұхит түбіне", "Жер астына", "Тау шыңына", "Басқа елге"] },
                    { val: 200, q: "Кітапхананы табу үшін қазіргі уақытта қандай жұмыстар жүргізіліп жатыр?", a: "Археологиялық қазба", options: ["Құрылыс", "Археологиялық қазба", "Мұражай ашу", "Кітап басу"] },
                    { val: 300, q: "Рузбеханның айтуынша, Отырар кітаптарын қай қала тұрғындары да пайдаланған?", a: "Сығанақ", options: ["Сауран", "Сығанақ", "Тараз", "Бұқара"] },
                    { val: 400, q: "Кітапхана қорында қандай орама қағаздар болған?", a: "Папирус", options: ["Пергамент", "Папирус", "Қайың қабығы", "Береста"] },
                    { val: 500, q: "Кітап сыйлау дәстүрі мемлекетте қандай мәртебеге ие болды?", a: "Мемлекеттік рәсім", options: ["Жай әдет", "Мемлекеттік рәсім", "Құпия заң", "Ойын түрі"] }
                ]
            },
            {
                category: "Киелі Мекен",
                questions: [
                    { val: 100, q: "Отырар кітапханасы алып аймақта ненің дәнін септі деп сипатталады?", a: "Ілім", options: ["Егін", "Ілім", "Бостандық", "Достық"] },
                    { val: 200, q: "Мәтінде кітапхананы қалай атайды?", a: "Білім бұлағы", options: ["Кітап үйі", "Білім бұлағы", "Алтын орда", "Ғылым ордасы"] },
                    { val: 300, q: "Отырар кітапханасында қай өңір ғалымдарының еңбектері болған?", a: "Еуропа, араб, қытай", options: ["Тек араб", "Тек қытай", "Еуропа, араб, қытай", "Тек грек"] },
                    { val: 400, q: "Моңғол шапқыншылығына дейін Отырар кітапханасы кімдердің аяғына тапталды?", a: "Шапқыншылардың", options: ["Жергілікті халықтың", "Көпестердің", "Шапқыншылардың", "Батырлардың"] },
                    { val: 500, q: "Кітапхананың нақты қайда екенін бүгінде кім біледі?", a: "Ешкім білмейді", options: ["Ғалымдар", "Жергілікті халық", "Ешкім білмейді", "Тарихшылар"] }
                ]
            }
        ];

        let currentScore = 0;
        let answeredCount = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            gameData.forEach((cat, catIdx) => {
                const col = document.createElement('div');
                col.className = 'flex flex-col gap-4';
                
                const catHeader = document.createElement('div');
                catHeader.className = 'cinematic-font text-center font-bold mb-2 h-12 flex items-center justify-center border-b-2 border-[#8e6d3d]';
                catHeader.innerText = cat.category;
                col.appendChild(catHeader);
                
                cat.questions.forEach((q, qIdx) => {
                    const card = document.createElement('div');
                    card.id = `q-${catIdx}-${qIdx}`;
                    card.className = 'card-gold p-6 text-center text-2xl font-bold cinematic-font rounded';
                    card.innerText = q.val;
                    card.onclick = () => openQuestion(catIdx, qIdx);
                    col.appendChild(card);
                });
                
                board.appendChild(col);
            });
        }

        function openQuestion(catIdx, qIdx) {
            const card = document.getElementById(`q-${catIdx}-${qIdx}`);
            if (card.classList.contains('disabled')) return;

            const qData = gameData[catIdx].questions[qIdx];
            const modal = document.getElementById('modal');
            const questionText = document.getElementById('modal-question');
            const categoryText = document.getElementById('modal-category');
            const optionsContainer = document.getElementById('options-container');
            const feedback = document.getElementById('feedback');
            const closeBtn = document.getElementById('close-btn');

            categoryText.innerText = `${gameData[catIdx].category} - ${qData.val}`;
            questionText.innerText = qData.q;
            feedback.className = 'hidden mb-6 py-2 px-4 rounded font-bold text-lg';
            closeBtn.classList.add('hidden');
            
            optionsContainer.innerHTML = '';
            // Shuffle options
            const shuffledOptions = [...qData.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'border border-[#8e6d3d] py-3 px-6 rounded hover:bg-[#8e6d3d] hover:text-[#1a0f00] transition duration-200 text-left';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, qData.a, qData.val, catIdx, qIdx);
                optionsContainer.appendChild(btn);
            });

            modal.classList.remove('hidden');
            card.classList.add('disabled');
        }

        function checkAnswer(selected, correct, points, catIdx, qIdx) {
            const feedback = document.getElementById('feedback');
            const closeBtn = document.getElementById('close-btn');
            const options = document.getElementById('options-container').children;

            // Disable all option buttons
            for (let btn of options) {
                btn.disabled = true;
                if (btn.innerText === correct) {
                    btn.classList.add('bg-green-900', 'border-green-500');
                } else if (btn.innerText === selected && selected !== correct) {
                    btn.classList.add('bg-red-900', 'border-red-500');
                }
            }

            if (selected === correct) {
                currentScore += points;
                feedback.innerText = "Дұрыс! Ілім қазынасына үлес қостыңыз.";
                feedback.className = 'mb-6 py-2 px-4 rounded font-bold text-lg bg-green-900/50 text-green-300 block';
            } else {
                feedback.innerText = `Қате. Дұрыс жауабы: ${correct}`;
                feedback.className = 'mb-6 py-2 px-4 rounded font-bold text-lg bg-red-900/50 text-red-300 block';
            }

            document.getElementById('score').innerText = currentScore;
            closeBtn.classList.remove('hidden');
            answeredCount++;
            
            if (answeredCount === 20) {
                closeBtn.innerText = "Экспедицияны аяқтау";
                closeBtn.onclick = showFinalResult;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function showFinalResult() {
            const modalContent = document.getElementById('modal-content');
            let rank = "";
            if (currentScore >= 5000) rank = "Ұлы Ғұлама";
            else if (currentScore >= 3000) rank = "Отырар Жылнамашысы";
            else if (currentScore >= 1500) rank = "Оқымысты Ізденуші";
            else rank = "Жас Саяхатшы";

            modalContent.innerHTML = `
                <h2 class="header-title text-4xl mb-4 golden-text">Экспедиция Нәтижесі</h2>
                <p class="text-xl mb-2">Жиналған ұпай: <span class="font-bold text-2xl">${currentScore}</span></p>
                <p class="text-2xl mb-8 uppercase tracking-widest italic">${rank}</p>
                <p class="text-gray-400 mb-8 italic">Сіз Отырар кітапханасының тарихи құндылығын бағалай білдіңіз. Бұл білім — болашақтың алтын кілті.</p>
                <button onclick="location.reload()" class="btn-action px-10 py-3 rounded-full">Қайта бастау</button>
            `;
        }
    </script>
</body>
</html>
